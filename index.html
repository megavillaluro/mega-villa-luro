<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Villa Luro 2026 - Actualizado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* Mantenemos tu estilo original intacto */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#222}
.tabs{display:flex;background:#1a1a1a;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.tab{flex:1;min-width:65px;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,.45);background:transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:#fff;border-bottom:3px solid var(--tc)}
.dash{display:none;padding:15px}
.dash.active{display:block}
.header{padding:13px 18px;border-radius:10px;margin-bottom:13px;background:var(--tc);color:#fff}
.hn{font-size:21px;font-weight:700}
.hs{font-size:11px;opacity:0.8}
.pills{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.pill{padding:5px 10px;border-radius:15px;border:1px solid #ccc;background:#fff;font-size:11px;font-weight:700;cursor:pointer;color:#666}
.pill.active{background:var(--tc);color:#fff;border-color:var(--tc)}
.kpis,.catkpis{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:13px}
.kpi,.ck{background:#fff;border-radius:8px;padding:10px;border:1px solid #ddd;text-align:center}
.kl,.ck .l{font-size:9px;color:#777;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.kv,.ck .v{font-size:18px;font-weight:700}
.panel{background:#fff;border-radius:8px;border:1px solid #ddd;margin-bottom:13px;overflow:hidden}
.ph{padding:8px 12px;font-size:11px;font-weight:700;background:#eee;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}
.pb{padding:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9f9f9;padding:6px;color:#555;font-size:10px;text-transform:uppercase;border-bottom:1px solid #ddd;text-align:left;cursor:pointer}
td{padding:6px;border-bottom:1px solid #eee}

/* NUEVO: Estilo para la etiqueta de categoría en la tabla */
.tag-cat {
    display: inline-block;
    font-size: 9px;
    background: #f0f0f0;
    color: #666;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 5px;
    font-weight: normal;
}

.sg{display:grid;grid-template-columns:2fr 1fr;gap:13px}
.sb{border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff}
.ssh{font-size:11px;font-weight:700;color:#fff;padding:8px 12px;background:var(--tc)}
.srch{width:100%;padding:6px 10px;border:none;border-bottom:1px solid #ddd;font-size:11px;outline:none}
.tw{max-height:300px;overflow-y:auto}
.cv{display:none}.cv.active{display:block}
@media(max-width:768px){.kpis,.catkpis{grid-template-columns:repeat(3,1fr)}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="tabs" class="tabs"></div>
<div id="root"></div>

<script>
// TUS DATOS REALES (EXTRAÍDOS DE dashboards_mvl_v6_2.html)
const TIRAS = {
  rojo: {
    label:'Mega Rojo', color:'#dc2626', sub:'FEFI - Temporada 2026',
    overall:{pj:10,g:5,e:2,p:3,gf:53,gc:27},
    cats:{
      '2013':{pj:2,g:2,e:0,p:0,gf:19,gc:7,matches:[{f:'14/03',r:'Toque y Toque',gf:5,gc:3,res:'G'},{f:'21/03',r:'Villa Gral. Mitre',gf:14,gc:4,res:'G'}],players:[{n:'Fortunato Tobio, Marco',pj:2,g:5},{n:'Gandini, Bruno',pj:2,g:5},{n:'López, Lautaro',pj:2,g:5},{n:'Reck Diez, Danilo',pj:2,g:3},{n:'Orsi, Felipe',pj:2,g:1}]},
      '2014':{pj:2,g:1,e:0,p:1,gf:10,gc:5,matches:[{f:'14/03',r:'Toque y Toque',gf:2,gc:3,res:'P'},{f:'21/03',r:'Villa Gral. Mitre',gf:8,gc:2,res:'G'}],players:[{n:'García Orozco, Luciano',pj:2,g:4},{n:'Gloazzo Rombola, Dante',pj:2,g:2},{n:'Azocar González, Noah',pj:2,g:1}]},
      '2015':{pj:2,g:1,e:1,p:0,gf:12,gc:4,matches:[{f:'14/03',r:'Toque y Toque',gf:3,gc:3,res:'E'},{f:'21/03',r:'Villa Gral. Mitre',gf:9,gc:1,res:'G'}],players:[{n:'Martínez Saavedra, León',pj:3,g:6},{n:'Gazzia Stremiz, Juan Pablo',pj:2,g:3},{n:'Gervasi, Benjamín',pj:2,g:2}]},
      '2016':{pj:2,g:1,e:1,p:0,gf:11,gc:2,matches:[{f:'14/03',r:'Toque y Toque',gf:2,gc:2,res:'E'},{f:'21/03',r:'Villa Gral. Mitre',gf:9,gc:0,res:'G'}],players:[{n:'Rocchi, Simón',pj:2,g:5},{n:'Cortina, Luca',pj:2,g:4},{n:'Bidoglio, Juan Cruz',pj:2,g:2}]}
    }
  },
  negro: {
    label:'Mega Negro', color:'#374151', sub:'FEFI - Temporada 2026',
    overall:{pj:10,g:3,e:0,p:7,gf:17,gc:39},
    cats:{ '2013':{pj:2,g:0,e:0,p:2,gf:2,gc:10,matches:[],players:[{n:'Soto, Mateo',pj:2,g:1}]} }
  },
  blanco: { label:'Mega Blanco', color:'#475569', sub:'FEFI - Temporada 2026', overall:{pj:9,g:4,e:0,p:5,gf:35,gc:25}, cats:{} },
  violeta: { label:'Mega Violeta', color:'#7c3aed', sub:'BAFI - Femenino', overall:{pj:4,g:4,e:0,p:0,gf:18,gc:1}, cats:{} },
  verde: { label:'Mega Verde', color:'#16a34a', sub:'Promocional', overall:{pj:5,g:2,e:0,p:3,gf:18,gc:26}, cats:{} },
  peques: { label:'Mega Peques', color:'#0891b2', sub:'Escuelita', overall:{pj:1,g:0,e:1,p:0,gf:4,gc:4}, cats:{} }
};

function init() {
  const tDiv = document.getElementById('tabs');
  const rDiv = document.getElementById('root');
  
  Object.keys(TIRAS).forEach((tk, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (idx===0?' active':'');
    btn.textContent = TIRAS[tk].label;
    btn.style.setProperty('--tc', TIRAS[tk].color);
    btn.onclick = () => switchTab(tk);
    tDiv.appendChild(btn);

    const dash = document.createElement('div');
    dash.id = 'dash-' + tk;
    dash.className = 'dash' + (idx===0?' active':'');
    dash.style.setProperty('--tc', TIRAS[tk].color);
    dash.innerHTML = renderTira(tk);
    rDiv.appendChild(dash);
  });
}

function renderTira(tk) {
  const t = TIRAS[tk];
  
  // Recopilar todos los jugadores de todas las categorías de esta tira para el Resumen
  let todosLosJugadores = [];
  Object.keys(t.cats).forEach(catName => {
    const c = t.cats[catName];
    if(c.players) {
        c.players.forEach(p => {
            todosLosJugadores.push({...p, categoria: catName});
        });
    }
  });
  todosLosJugadores.sort((a,b) => b.g - a.g);

  return `
    <div class="header">
      <div class="hn">${t.label}</div>
      <div class="hs">${t.sub}</div>
    </div>
    <div class="pills">
      <div class="pill active" onclick="switchCat('${tk}','Resumen')">RESUMEN</div>
      ${Object.keys(t.cats).map(c => `<div class="pill" onclick="switchCat('${tk}','${c}')">${c}</div>`).join('')}
    </div>

    <div id="cv-${tk}-Resumen" class="cv active">
      <div class="kpis">
        <div class="kpi"><div class="kl">PJ</div><div class="kv">${t.overall.pj}</div></div>
        <div class="kpi"><div class="kl">G</div><div class="kv">${t.overall.g}</div></div>
        <div class="kpi"><div class="kl">E</div><div class="kv">${t.overall.e}</div></div>
        <div class="kpi"><div class="kl">P</div><div class="kv">${t.overall.p}</div></div>
        <div class="kpi"><div class="kl">GF</div><div class="kv">${t.overall.gf}</div></div>
        <div class="kpi"><div class="kl">GC</div><div class="kv">${t.overall.gc}</div></div>
      </div>
      <div class="sg">
        ${renderTable(tk + '-global', 'Goleadores Tira (Todos)', todosLosJugadores)}
      </div>
    </div>

    ${Object.keys(t.cats).map(ck => {
        const c = t.cats[ck];
        const jugadoresCat = (c.players || []).map(p => ({...p, categoria: ck}));
        return `
        <div id="cv-${tk}-${ck}" class="cv">
          <div class="catkpis">
            <div class="ck"><div class="l">PJ</div><div class="v">${c.pj}</div></div>
            <div class="ck"><div class="l">G</div><div class="v">${c.g}</div></div>
            <div class="ck"><div class="l">E</div><div class="v">${c.e}</div></div>
            <div class="ck"><div class="l">P</div><div class="v">${c.p}</div></div>
          </div>
          <div class="sg">
             ${renderTable(tk + '-' + ck, 'Goleadores ' + ck, jugadoresCat)}
          </div>
        </div>`;
    }).join('')}
  `;
}

function renderTable(id, title, data) {
  return `
    <div class="sb" style="grid-column: span 2">
      <div class="ssh">${title}</div>
      <input type="text" class="srch" placeholder="Buscar jugador..." oninput="flt('${id}', this.value)">
      <div class="tw">
        <table id="${id}">
          <thead>
            <tr><th>Jugador</th><th style="text-align:center">PJ</th><th style="text-align:center">G</th></tr>
          </thead>
          <tbody>
            ${data.map(p => `
              <tr data-n="${p.n.toLowerCase()}">
                <td>
                    <b>${p.n}</b>
                    <span class="tag-cat">${p.categoria}</span>
                </td>
                <td style="text-align:center">${p.pj}</td>
                <td style="text-align:center; font-weight:bold; color:var(--tc)">${p.g}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function switchTab(k) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === TIRAS[k].label));
  document.querySelectorAll('.dash').forEach(d => d.classList.toggle('active', d.id === 'dash-' + k));
}

function switchCat(tk, ck) {
  const dash = document.getElementById('dash-' + tk);
  dash.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.textContent === ck.toUpperCase()));
  dash.querySelectorAll('.cv').forEach(v => v.classList.remove('active'));
  document.getElementById('cv-' + tk + '-' + ck).classList.add('active');
}

function flt(tid, q) {
  const ql = q.toLowerCase();
  document.querySelectorAll('#' + tid + ' tbody tr').forEach(tr => {
    tr.style.display = tr.dataset.n.includes(ql) ? '' : 'none';
  });
}

window.onload = init;
</script>
</body>
</html>
