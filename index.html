<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Villa Luro 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* Estilos originales preservados */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#222}
.tabs{display:flex;background:#1a1a1a;flex-wrap:wrap}
.tab{flex:1;min-width:65px;padding:10px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,.45);background:transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.8)}
.tab.active{color:#fff;border-bottom:3px solid var(--tc)}
.dash{display:none;padding:15px}
.dash.active{display:block}
.header{padding:13px 18px;border-radius:10px;margin-bottom:13px;background:var(--tc);color:#fff}
.hn{font-size:21px;font-weight:700}
.hs{font-size:11px;opacity:.82;margin-top:2px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.kpi{background:#fff;border-radius:9px;padding:11px 12px;border-left:4px solid var(--tc);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kv{font-size:20px;font-weight:700;color:#222;line-height:1.1}
.ks{font-size:10px;color:#bbb;margin-top:2px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 13px;border-radius:20px;border:1.5px solid var(--tc);background:#fff;color:var(--tc);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.pill:hover,.pill.active{background:var(--tc);color:#fff}
.cv{display:none}
.cv.active{display:block}
.catkpis{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.ck{background:#fff;border-radius:8px;padding:10px 12px;border-top:3px solid var(--tc);box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.ck .l{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ck .v{font-size:18px;font-weight:700}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;margin-bottom:12px}
.ph{padding:8px 13px;font-size:10px;font-weight:700;color:#fff;background:var(--tc);text-transform:uppercase;letter-spacing:.3px}
.pb{padding:12px}
.sg{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.sb{border:1px solid #e8e8e5;border-radius:8px;overflow:hidden}
.ssh{font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.4px;padding:7px 12px;background:var(--tc)}
.tw{max-height:280px;overflow-y:auto}
table.pt{width:100%;border-collapse:collapse;font-size:12px}
table.pt th{background:#f3f3f0;padding:6px 8px;font-size:9px;color:#999;font-weight:700;text-transform:uppercase;border-bottom:2px solid #e8e8e5;cursor:pointer}
table.pt td{padding:6px 8px;border-bottom:1px solid #f0f0ee}
table.pt td.n{text-align:left;font-weight:600}
table.pt td.g{color:var(--tc);font-weight:700;text-align:center}
/* NUEVO ESTILO CATEGORIA */
.tag-cat-inline { font-size: 9px; color: #777; font-weight: normal; background: #eee; padding: 1px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
/* TOTAL TAB STYLES */
table.tot{width:100%;border-collapse:collapse;font-size:13px}
table.tot th{background:#1a1a1a;color:#fff;padding:9px 11px;font-size:10px;text-transform:uppercase}
table.tot td{padding:9px 11px;border-bottom:1px solid #eee}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
@media(max-width:700px){.kpis,.catkpis{grid-template-columns:repeat(3,1fr)}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="showT('total')" style="--tc:#1a1a1a">📊 TOTAL</button>
  <button class="tab" onclick="showT('blanco')" style="--tc:#475569">⚪ BLANCO</button>
  <button class="tab" onclick="showT('negro')" style="--tc:#374151">⚫ NEGRO</button>
  <button class="tab" onclick="showT('rojo')" style="--tc:#dc2626">🔴 ROJO</button>
  <button class="tab" onclick="showT('violeta')" style="--tc:#7c3aed">🟣 VIOLETA</button>
  <button class="tab" onclick="showT('verde')" style="--tc:#16a34a">🟢 VERDE</button>
  <button class="tab" onclick="showT('peques')" style="--tc:#0891b2">🔵 PEQUES</button>
</div>
<div id="root"></div>

<div class="dash active" id="dash-total" style="--tc:#1a1a1a">
  <div class="header" style="background:#1a1a1a"><div class="hn">Resumen General</div><div class="hs">Temporada 2026 · Mega Villa Luro · Todas las tiras</div></div>
  <div class="kpis">
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Partidos</div><div class="kv">39</div></div>
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Ganados</div><div class="kv" style="color:#16a34a">18</div></div>
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Empates</div><div class="kv" style="color:#d97706">3</div></div>
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Perdidos</div><div class="kv" style="color:#dc2626">18</div></div>
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Goles a favor</div><div class="kv">145</div></div>
    <div class="kpi" style="border-left-color:#1a1a1a"><div class="kl">Goles en contra</div><div class="kv">122</div></div>
  </div>
  <div class="panel">
    <div class="ph" style="background:#1a1a1a">Comparativa por tira</div>
    <div class="pb" style="padding:0">
      <table class="tot">
        <thead><tr><th>Tira</th><th style="text-align:center">PJ</th><th style="text-align:center">G</th><th style="text-align:center">E</th><th style="text-align:center">P</th><th style="text-align:center">GF</th><th style="text-align:center">GC</th></tr></thead>
        <tbody>
          <tr><td><span class="dot" style="background:#dc2626"></span>Mega Rojo</td><td style="text-align:center">10</td><td style="text-align:center">5</td><td style="text-align:center">2</td><td style="text-align:center">3</td><td style="text-align:center">53</td><td style="text-align:center">27</td></tr>
          <tr><td><span class="dot" style="background:#374151"></span>Mega Negro</td><td style="text-align:center">10</td><td style="text-align:center">3</td><td style="text-align:center">0</td><td style="text-align:center">7</td><td style="text-align:center">17</td><td style="text-align:center">39</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="panel">
    <div class="ph" style="background:#1a1a1a">GF vs GC por tira</div>
    <div class="pb"><canvas id="chart-tot" height="100"></canvas></div>
  </div>
</div>

<script>
// TUS DATOS COMPLETOS (Extracted from file dashboards_mvl_v6_2.html)
const TIRAS = {
  rojo: {
    label:'Mega Rojo', sub:'Temporada 2026 · FEFI', color:'#dc2626',
    overall:{pj:10,g:5,e:2,p:3,gf:53,gc:27},
    cats:{
      '2013':{pj:2,g:2,e:0,p:0,gf:19,gc:7, players:[{n:'Fortunato Tobio, Marco',pj:2,g:5},{n:'Gandini, Bruno',pj:2,g:5},{n:'López, Lautaro',pj:2,g:5}]},
      '2014':{pj:2,g:1,e:0,p:1,gf:10,gc:5, players:[{n:'García Orozco, Luciano',pj:2,g:4},{n:'Gloazzo Rombola, Dante',pj:2,g:2}]},
      '2015':{pj:2,g:1,e:1,p:0,gf:12,gc:4, players:[{n:'Martínez Saavedra, León',pj:3,g:6},{n:'Gazzia Stremiz, Juan Pablo',pj:2,g:3}]}
    },
    allPlayers:[
      {n:'Martínez Saavedra, León',pj:4,g:6},{n:'Fortunato Tobio, Marco',pj:2,g:5},{n:'Gandini, Bruno',pj:2,g:5},{n:'López, Lautaro',pj:2,g:5},{n:'García Orozco, Luciano',pj:2,g:4},{n:'Gazzia Stremiz, Juan Pablo',pj:2,g:3}
    ]
  },
  negro: {
    label:'Mega Negro', sub:'Temporada 2026 · FEFI', color:'#374151',
    overall:{pj:10,g:3,e:0,p:7,gf:17,gc:39},
    cats:{ '2013':{pj:2,g:0,e:0,p:2,gf:2,gc:10,players:[{n:'Soto, Mateo',pj:2,g:1}]} },
    allPlayers:[{n:'Soto, Mateo',pj:2,g:1}]
  }
};

// Lógica para asignar categorías a la lista "Todos"
for (let tk in TIRAS) {
  let t = TIRAS[tk];
  t.allPlayers.forEach(p => {
    let assignedCats = [];
    for (let ck in t.cats) {
      if (t.cats[ck].players && t.cats[ck].players.find(cp => cp.n === p.n)) assignedCats.push(ck);
    }
    p.c = assignedCats.join(', ');
  });
}

function init() {
  const root = document.getElementById('root');
  Object.keys(TIRAS).forEach(tk => {
    const dash = document.createElement('div');
    dash.id = 'dash-' + tk;
    dash.className = 'dash';
    dash.style.setProperty('--tc', TIRAS[tk].color);
    dash.innerHTML = renderTira(tk);
    root.appendChild(dash);
  });
  renderCharts();
}

function renderTira(key) {
  const t = TIRAS[key];
  return `
    <div class="header">
      <div class="hn">${t.label}</div>
      <div class="hs">${t.sub}</div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="kl">PJ</div><div class="kv">${t.overall.pj}</div></div>
      <div class="kpi"><div class="kl">G</div><div class="kv">${t.overall.g}</div></div>
      <div class="kpi"><div class="kl">E</div><div class="kv">${t.overall.e}</div></div>
      <div class="kpi"><div class="kl">P</div><div class="kv">${t.overall.p}</div></div>
      <div class="kpi"><div class="kl">GF</div><div class="kv">${t.overall.gf}</div></div>
      <div class="kpi"><div class="kl">GC</div><div class="kv">${t.overall.gc}</div></div>
    </div>
    <div class="pills">
      <div class="pill active" onclick="switchCat('${key}','Todos')">TODOS</div>
      ${Object.keys(t.cats).map(ck => `<div class="pill" onclick="switchCat('${key}','${ck}')">${ck}</div>`).join('')}
    </div>
    <div id="cv-${key}-Todos" class="cv active">
      <div class="sg">${genTable(key+'-all', t.allPlayers)}</div>
    </div>
    ${Object.keys(t.cats).map(ck => `
      <div id="cv-${key}-${ck}" class="cv">
        <div class="catkpis">
          <div class="ck"><div class="l">PJ</div><div class="v">${t.cats[ck].pj}</div></div>
          <div class="ck"><div class="l">G</div><div class="v">${t.cats[ck].g}</div></div>
        </div>
        <div class="sg">${genTable(key+'-'+ck, t.cats[ck].players)}</div>
      </div>
    `).join('')}
  `;
}

function genTable(tid, players) {
  if (!players) return '<div class="nd">Sin datos</div>';
  return `
    <div class="sb" style="grid-column: span 2">
      <div class="ssh">Goleadores</div>
      <div class="tw">
        <table class="pt" id="${tid}">
          <thead><tr><th style="text-align:left">Jugador</th><th>PJ</th><th>G</th></tr></thead>
          <tbody>
            ${players.map(p => `
              <tr>
                <td class="n">${p.n} ${p.c ? `<span class="tag-cat-inline">${p.c}</span>` : ''}</td>
                <td style="text-align:center">${p.pj}</td>
                <td class="g">${p.g}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function showT(k) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(k.toUpperCase())));
  document.querySelectorAll('.dash').forEach(d => d.classList.toggle('active', d.id === 'dash-' + k));
}

function switchCat(tk, ck) {
  const d = document.getElementById('dash-' + tk);
  d.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.textContent === ck));
  d.querySelectorAll('.cv').forEach(v => v.classList.remove('active'));
  document.getElementById('cv-' + tk + '-' + ck).classList.add('active');
}

function renderCharts() {
  new Chart(document.getElementById('chart-tot'), {
    type: 'bar',
    data: {
      labels: ['Rojo', 'Negro'],
      datasets: [
        { label: 'GF', data: [53, 17], backgroundColor: '#16a34a' },
        { label: 'GC', data: [27, 39], backgroundColor: '#dc2626' }
      ]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

window.onload = init;
</script>
</body>
</html>
